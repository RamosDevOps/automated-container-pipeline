name: CI/CD Pipeline

# This triggers the workflow on every push to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your repository code onto GitHub's runner
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Set up Python on the runner
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. Install your Flask and Pytest dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # 4. Run Pytest (This will stop the pipeline if your tests fail!)
      - name: Run Unit Tests
        run: |
          pytest

      # 5. Log in to your Docker Hub using the secrets we saved
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build the image and push it to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ramosjm080/automated-container-pipeline:latest
name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python on the runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # 4. Run Unit Tests
      - name: Run Unit Tests
        run: |
          pytest

      # 5. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Build the image and push it to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ramosjm080/automated-container-pipeline:latest

      # 7. Trigger Render deployment using your secure Deploy Hook!
      - name: Deploy to Render
        run: |
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK }}"
